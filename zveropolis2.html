<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Зверополис 2 — Онлайн Кинотека</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: url('https://images3.alphacoders.com/140/1402521.jpg') no-repeat center center/cover;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        /* Overlay для затемнения */
        body::before {
            content: '';
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.55);
            z-index:0;
        }

        header {
            text-align: center;
            padding: 60px 20px 20px;
            z-index:1;
            position: relative;
        }

        header h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

        header p {
            font-size: 20px;
            opacity: 0.9;
            text-shadow: 1px 1px 6px rgba(0,0,0,0.6);
        }

        .player-container {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            position: relative;
            z-index:1;
            background: #000;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
        }

        .btn {
            margin-top: 20px;
            padding: 14px 28px;
            background: #ffcc00;
            color: #000;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            z-index:1;
            position: relative;
        }

        .btn:hover {
            background: #ffd633;
            transform: scale(1.05);
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 14px;
            opacity: 0.8;
            text-align: center;
            z-index:1;
            position: relative;
        }

        /* Анимация появления */
        header, .player-container, footer {
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity:0; transform: translateY(20px); }
            to { opacity:1; transform: translateY(0); }
        }

        @media(max-width: 768px){
            header h1 { font-size: 36px; }
            header p { font-size: 16px; }
        }
    </style>
</head>
<body>

<header>
    <h1>Зверополис 2</h1>
    <p>Смотрите онлайн в хорошем качестве</p>
    <button class="btn" onclick="scrollToPlayer()">Смотреть сейчас</button>
</header>

<div class="player-container" id="playerSection">
    <video id="video" controls playsinline></video>
</div>

<footer>
    © 2026 Онлайн Кинотека
</footer>

<script>
    const video = document.getElementById('video');
    const videoSrc = 'https://fl-ru-cdn.evrtabor.ru/zvp2/stream.m3u8';

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            // video.play(); // Автовоспроизведение можно включить, если нужно
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
    }

    function scrollToPlayer() {
        document.getElementById('playerSection').scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
